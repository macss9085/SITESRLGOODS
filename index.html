<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SRLGOODS</title>
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.28/build/spline-viewer.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; background: #000; overflow: hidden; }

    /* Boxes — full screen background using spline-viewer */
    spline-viewer {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
    }

    /* Navbar wrapper — clips the Spline scene to just the navbar strip */
    #navbar-wrap {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 120px;
      overflow: hidden;
      z-index: 1;
    }

    #navbar-wrap iframe {
      width: 100vw;
      height: 100vh;
      border: none;
      position: absolute;
      top: 0; left: 0;
    }
  </style>
</head>
<body>

  <spline-viewer url="https://prod.spline.design/VK0KgYVjWBY0pFYw/scene.splinecode"></spline-viewer>

  <div id="navbar-wrap">
    <iframe src="https://my.spline.design/thresholddarkambientui-jREVFGyt6Li5oE5KDVAdCzoj/" allow="autoplay" allowfullscreen></iframe>
  </div>

</body>
</html>
